baseURL = "https://alei37.github.io/"
defaultContentLanguage = "zh-cn"
locale = "zh-CN"
title = "alei's blog"
theme = "LoveIt"

# 部署
[deployment]
  [[deployment.targets]]
    name = "github"
    URL = "git@github.com:alei37/alei37.github.io.git"
    branch = "main"

###############################################
# 站点信息
###############################################
[params]
  env = "production"
  # 作者信息（LoveIt 要求是对象，不是字符串）
  [params.author]
    name = "alei"
    email = "2114591501@qq.com"
    link = "/about/"
  description = "记录技术探索 · 地震学笔记 · 生活随想"
  keywords = ["博客", "地震学", "计算机", "AI", "书单"]

  # 社交链接（按需填写）
  [params.social]
    github = "alei37"
    email = "2114591501@qq.com"
    # bilibili = "alei_37"

###############################################
# 主题配置
###############################################
[params.style]
  # 主题色
  themeColor = "#0070c0"
  # 暗色主题配色
  darkThemeColor = "#5e72e4"
  # 自定义 CSS
  customCSS = []
  
# 页面头部导航栏
[params.header]
  # 桌面端导航栏模式 ["fixed", "normal", "auto"]
  desktopMode = "fixed"
  # 移动端导航栏模式
  mobileMode = "auto"
  # 导航栏标题（就是左上角显示的文字）
  [params.header.title]
    # LOGO 图片（留空就用文字）
    logo = ""
    # 标题文字 ← 你要改的就是这个
    name = "alei's blog"
    # 标题前的图标（HTML 格式，可选）
    pre = ""
    # 标题后的图标
    post = ""
    # 标题是否带打字机动画
    typeit = false

[params.home]
  # 首页每页文章数
  postsPerPage = 10
  # 显示文章列表
  postDateFormat = "2006-01-02"
  # 显示分类
  showCategories = true
  # 显示标签
  showTags = true

  # 首页个人卡片（头像 + 标题 + 副标题）
  [params.home.profile]
    enable = true
    # Gravatar 邮箱（留空就用 avatarURL）
    gravatarEmail = ""
    # 首页头像 ← 关键字段！
    avatarURL = "/images/avatar.jpg"
    # 标题
    title = "alei site"
    # 副标题
    subtitle = "This is alei's home page"
    # 是否打字机动画
    typeit = false
    # 是否显示社交链接
    social = true

[params.page]
  # 显示目录
  showTableOfContents = true
  # 显示字数统计
  showWordCount = true
  # 显示阅读时间
  showReadingTime = true
  # 评论
  enableComments = true
  # 代码高亮
  highlight = true
  highlightLanguages = ["python", "fortran", "matlab", "bash"]
  highlightLanguagesDefault = false
  # 数学公式（KaTeX）
  [params.page.math]
    enable = true
    # 复制 LaTeX 源码
    copyTex = true
    # 化学公式支持
    mhchem = true

[params.search]
  enable = true
  # 本地搜索（无需配置 Algolia）
  [params.search.algolia]
    enable = false
  # Fuse.js 本地搜索
  [params.search.fusejs]
    enable = true
    # 搜索结果数量
    threshold = 0.6
    # 是否显示快捷键提示
    showKeyHint = true

[params.analytics]
  # Google Analytics（填你的 ID）
  google_analytics = ""
  # 不蒜子统计（国内友好）
  busuanzi_site_uv = true
  busuanzi_site_pv = true

[params.page.comment]
  enable = true
  # Giscus（GitHub Discussions 评论，推荐）
  [params.page.comment.giscus]
    enable = true
    repo = "alei37/alei37.github.io"
    repoId = "R_kgDOTMJovQ"
    category = "Announcements"
    categoryId = "DIC_kwDOTMJovc4DAaga"
    mapping = "pathname"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "bottom"
    lightTheme = "noborder_light"
    darkTheme = "noborder_dark"
    lang = "zh-CN"

[params.mapbox]
  enable = false

[params.encryption]
  enable = false

[params.flowchart]
  enable = false

###############################################
# 菜单导航
###############################################
[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10
[[menu.main]]
  identifier = "computer"
  name = "计算机学习"
  url = "/posts/computer/"
  weight = 11
[[menu.main]]
  identifier = "seismology"
  name = "地震学习"
  url = "/posts/seismology/"
  weight = 12
[[menu.main]]
  identifier = "ai"
  name = "AI"
  url = "/posts/ai/"
  weight = 13
[[menu.main]]
  identifier = "market"
  name = "💹 股票与市场"
  url = "/posts/market/"
  weight = 14
[[menu.main]]
  identifier = "books"
  name = "📚 书籍分享"
  url = "/books/"
  weight = 15
[[menu.main]]
  identifier = "about"
  name = "关于我"
  url = "/about/"
  weight = 20

###############################################
# 文章分类（对应四个分区）
###############################################
[taxonomies]
  tag = "tags"
  category = "categories"

###############################################
# Markdown 渲染
###############################################
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    style = "github-dark"

###############################################
# 输出配置
###############################################
[outputs]
  home = ["HTML", "RSS", "JSON"]